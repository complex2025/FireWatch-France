<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔥 FireWatch France</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5}
header{background:#c62828;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:22px}
.state{background:#2e7d32;padding:6px 12px;border-radius:20px;font-weight:bold}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px;background:#fff}
input,select,button{padding:8px;border-radius:6px;border:1px solid #bbb}
button{background:#1976d2;color:#fff;border:none;cursor:pointer}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 108px)}
.panel{background:#f7f7f7;overflow:auto}
.card{background:#fff;margin:10px;padding:12px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
#map{height:100%;width:100%}
@media(max-width:800px){
.layout{grid-template-columns:1fr;grid-template-rows:auto 55vh}
.panel{order:2}
}
</style>
</head>
<body>

<header>
<h1>🔥 FireWatch France</h1>
<div class="state">🟢 Surveillance</div>
</header>

<div class="toolbar">
<input value="Surfonds" id="ville">
<select id="rayon">
<option>10</option>
<option>20</option>
<option selected>30</option>
<option>50</option>
<option>100</option>
</select>
<button onclick="majMeteo()">🔄 Actualiser</button>
</div>

<div class="layout">

<div class="panel">

<div class="card">
<h3>🔥 Alertes</h3>
<div>🟢 Aucune alerte</div>
</div>

<div class="card">
<h3>💨 Météo</h3>
<div id="meteo">Chargement...</div>
</div>

<div class="card">
<h3>🛰 Sources</h3>
OpenStreetMap ✅<br>
Open-Meteo ✅<br>
Préfectures ⏳<br>
Copernicus ⏳
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const lat=48.138;
const lon=0.520;

const map=L.map('map').setView([lat,lon],10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{attribution:'© OpenStreetMap'}
).addTo(map);

L.marker([lat,lon]).addTo(map).bindPopup("Surfonds");

let cercle=L.circle([lat,lon],{
radius:30000,
color:"green",
fill:false
}).addTo(map);

document.getElementById("rayon").onchange=function(){
map.removeLayer(cercle);
cercle=L.circle([lat,lon],{
radius:Number(this.value)*1000,
color:"green",
fill:false
}).addTo(map);
}

async function majMeteo(){

const div=document.getElementById("meteo");

try{

const r=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m`
);

const d=await r.json();

div.innerHTML=
`🌡 ${d.current.temperature_2m} °C<br>
💨 ${d.current.wind_speed_10m} km/h<br>
🧭 ${d.current.wind_direction_10m}°<br>
🕒 ${new Date().toLocaleTimeString()}`;

}catch(e){

div.innerHTML="⚠️ Impossible de récupérer la météo.";

}

}

majMeteo();

setInterval(majMeteo,60000);

</script>

</body>
</html>
